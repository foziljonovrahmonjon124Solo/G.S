<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geofiltratsiya Simulyator Platformasi</title>
    <!-- Modern premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="hero">
            <h1>Geofiltratsiya Veb-Platformasi 💧</h1>
            <p>Adveksiya-Diffuziya va Darsi tenglamalari yordamida yer osti suvlari dinamikasini matematik modellashtirish.</p>
        </header>

        <main class="dashboard">
            <aside class="sidebar glass-panel">
                <h2>Parametrlar</h2>
                <form id="simForm">
                    <h3 style="margin-bottom:10px; font-size:14px; color:var(--text-primary); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Mobil Lokatsiya va AI Kamera</h3>
                    <div class="input-group">
                        <button type="button" id="getGpsBtn" style="width:100%; padding: 0.8rem; background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid #3b82f6; border-radius:10px; cursor:pointer; margin-bottom:0.5rem; transition:0.3s;">🌍 GPS orqali mintaqani topish</button>
                        <small id="gpsStatus" style="color:#94a3b8;"></small>
                    </div>
                    
                    <div class="input-group">
                        <label for="cameraInput">📸 AI Tuproq Tahlili (Rasm yuklash)</label>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="background:transparent; border:1px dashed rgba(255,255,255,0.2); padding:0.5rem; text-align:center;">
                    </div>

                    <h3 style="margin-top:20px; margin-bottom:10px; font-size:14px; color:var(--text-primary); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Asosiy Parametrlar</h3>
                    <div class="input-group">
                        <label for="soil_type">Tuproq Turi (Rasm orqali avto-aniqlanadi)</label>
                        <select id="soil_type" name="soil_type">
                            <option value="Shag'al">Shag'al</option>
                            <option value="Qum">Qum</option>
                            <option value="Supes">Supes</option>
                            <option value="Suglinka">Suglinka</option>
                            <option value="Loy">Loy</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="sim_time">Simulyatsiya Davomiyligi (soat): <span id="time-val">12</span> s</label>
                        <input type="range" id="sim_time" name="sim_time" min="1" max="48" value="12" oninput="document.getElementById('time-val').textContent = this.value;">
                    </div>

                    <div class="input-group">
                        <label for="Qs">Sug'orish Suvi Miqdori (m³/s, Qs)</label>
                        <input type="number" id="Qs" name="Qs" value="100.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label for="Qin">Yog'inlar (m³/s, Qin)</label>
                        <input type="number" id="Qin" name="Qin" value="0.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label for="Qb">Bug'lanish (m³/s, Qb)</label>
                        <input type="number" id="Qb" name="Qb" value="10.0" step="0.1">
                    </div>

                    <h3 style="margin-top:20px; font-size:14px; color:var(--text-primary); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">Fizik Omillar (Dinamik k)</h3>
                    
                    <div class="input-group">
                        <label for="T_temp">Harorat (T, °C)</label>
                        <input type="number" id="T_temp" name="T_temp" value="25" min="20" max="40" step="1">
                    </div>
                    <div class="input-group">
                        <label for="S0">Boshlang'ich sho'rlanish (S0)</label>
                        <input type="number" id="S0" name="S0" value="10.0" min="0.01" step="0.01">
                    </div>
                    <div class="input-group">
                        <label for="k_S">Tuz kamayish koeffitsiyenti (k_s)</label>
                        <input type="number" id="k_S" name="k_S" value="0.05" min="0.001" max="0.1" step="0.001">
                    </div>
                    <div class="input-group">
                        <label for="k_F">To'yinish tezligi (k_F)</label>
                        <input type="number" id="k_F" name="k_F" value="1.0" min="0.1" max="2.0" step="0.1">
                    </div>

                    <button type="submit" class="primary-btn">Simulyatsiyani Boshlash</button>
                </form>
                
                <div id="analytics" class="analytics-card" style="display: none;">
                    <h3>Tahlil Xulosasi</h3>
                    <p id="analysis-text"></p>
                </div>
            </aside>

            <section class="visuals">
                <div class="chart-container glass-panel">
                    <div id="chart_h"></div>
                </div>
                <div class="chart-wrapper-grid">
                    <div class="chart-container glass-panel">
                        <div id="chart_dyn"></div>
                    </div>
                    <div class="chart-container glass-panel">
                        <div id="chart_3d"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Plotly via CDN -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.error('SW registration failed: ', err));
        });
      }
    </script>
    <script src="app.js"></script>
</body>
</html>
